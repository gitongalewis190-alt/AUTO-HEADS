name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Type errors are real bugs — this MUST pass.
      - name: Type check
        run: npm run type-check

      # Unit / smoke tests — MUST pass.
      - name: Unit tests
        run: npm test -- --ci --passWithNoTests

      # Lint is a quality signal, not a gate — never block the pipeline on style.
      - name: Lint
        run: npm run lint
        continue-on-error: true
